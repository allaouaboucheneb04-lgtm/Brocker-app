  <style>
    :root{--bg:#f4f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--primary:#2563eb;--dark:#0f172a;--border:#e5e7eb;--green:#16a34a;--red:#dc2626}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text)}
    .app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.side{background:var(--dark);color:white;padding:22px;position:sticky;top:0;height:100vh}.brand{font-size:22px;font-weight:800;margin-bottom:4px}.sub{font-size:13px;color:#cbd5e1;margin-bottom:24px}.nav button{width:100%;border:0;background:transparent;color:#dbeafe;text-align:left;padding:13px 14px;border-radius:12px;font-weight:650;margin:4px 0}.nav button.active,.nav button:hover{background:#1d4ed8;color:white}.main{padding:24px;max-width:1280px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.top h1{margin:0;font-size:28px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 8px 30px rgba(15,23,42,.05);margin-bottom:16px}.stat b{font-size:27px}.muted{color:var(--muted);font-size:13px}.row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.row3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px} label{display:block;font-size:13px;font-weight:700;margin:10px 0 6px} input,select,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:white;font-size:14px} .btn{border:0;background:var(--primary);color:white;padding:12px 15px;border-radius:12px;font-weight:800;cursor:pointer}.btn.secondary{background:#e5e7eb;color:#111827}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.dark{background:#111827}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}table{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden}th,td{padding:11px;border-bottom:1px solid var(--border);text-align:left;font-size:14px}th{background:#f8fafc;font-size:12px;text-transform:uppercase;color:#64748b}.hidden{display:none}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.login .card{width:100%;max-width:430px}.pill{display:inline-flex;padding:5px 9px;border-radius:999px;background:#dbeafe;color:#1d4ed8;font-weight:800;font-size:12px}.notice{padding:12px;border-radius:12px;background:#eff6ff;color:#1e40af;margin:10px 0}.danger{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}@media(max-width:800px){.app{grid-template-columns:1fr}.side{height:auto;position:relative}.grid,.row,.row3{grid-template-columns:1fr}.main{padding:14px}.top{display:block}}
  </style>
</head>
<body>
<div id="login" class="login">
  <div class="card">
    <h1>Intelcom Broker Pay</h1>

      <button data-page="dashboard" class="active">Dashboard</button>

</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, query, where, orderBy, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const firebaseConfig={apiKey:"AIzaSyC8N0FYmFplqOdaZGzk-fxbqxX3kr3mmDQ",authDomain:"brocker-intel.firebaseapp.com",projectId:"brocker-intel",storageBucket:"brocker-intel.firebasestorage.app",messagingSenderId:"641968934387",appId:"1:641968934387:web:be779857dc0eb93a7bd686",measurementId:"G-L0MKXG2MS6"};
const appFb=initializeApp(firebaseConfig); const auth=getAuth(appFb); const db=getFirestore(appFb);
let state={user:null, role:'admin', currentPage:'dashboard', local:false};
const $=id=>document.getElementById(id); const money=n=>(Number(n||0)).toFixed(2)+' $';
const store={get(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};
const localData={users:()=>store.get('users',[]),drivers:()=>store.get('drivers',[]),weeks:()=>store.get('weeks',[]),settings:()=>store.get('settings',defaultSettings()),saveUsers:v=>store.set('users',v),saveDrivers:v=>store.set('drivers',v),saveWeeks:v=>store.set('weeks',v),saveSettings:v=>store.set('settings',v)};
function defaultSettings(){return {brokerName:'9486-5482 QUÉBEC INC',station:'STATION HICK, INTELCOM',address:'7245-A Boul Wilfrid-Hamel\nQuébec\nG2G 1B8',payTo:'Merouane Guellour',email:'abennounas-kibsolutions@outlook.com',phone:'514 793 3116',commission:25,feeMode:'barème',dailyFixed:60,barèmes:{Essence:[{min:0,max:100,amount:50},{min:101,max:999,amount:70}],Électrique:[{min:0,max:100,amount:30},{min:101,max:999,amount:50}],Diesel:[{min:0,max:100,amount:60},{min:101,max:999,amount:80}],Hybride:[{min:0,max:100,amount:45},{min:101,max:999,amount:65}]}}}
async function getSettings(){ if(state.local) return localData.settings(); const snap=await getDoc(doc(db,'settings','main')); if(!snap.exists()){await setDoc(doc(db,'settings','main'),defaultSettings()); return defaultSettings()} return snap.data(); }
async function saveSettings(s){ if(state.local) return localData.saveSettings(s); await setDoc(doc(db,'settings','main'),s); }
async function getDrivers(){ if(state.local) return localData.drivers(); const ss=await getDocs(collection(db,'drivers')); return ss.docs.map(d=>({id:d.id,...d.data()})); }
async function saveDriver(d){ if(state.local){let a=localData.drivers(); if(d.id){a=a.map(x=>x.id===d.id?d:x)}else{d.id='d'+Date.now();a.push(d)} localData.saveDrivers(a);return d.id} if(d.id){await setDoc(doc(db,'drivers',d.id),d,{merge:true});return d.id} return (await addDoc(collection(db,'drivers'),d)).id; }
async function getWeeks(){ if(state.local) return localData.weeks(); const ss=await getDocs(collection(db,'weeks')); return ss.docs.map(d=>({id:d.id,...d.data()})); }
async function saveWeek(w){ if(state.local){let a=localData.weeks(); w.id='w'+Date.now()+Math.random().toString(16).slice(2); a.push(w); localData.saveWeeks(a); return w.id} return (await addDoc(collection(db,'weeks'),w)).id; }
function showApp(){ $('login').classList.add('hidden'); $('app').classList.remove('hidden'); $('who').textContent=state.local?'Mode local':(state.user?.email||'admin'); render(); }
function showLogin(){ $('app').classList.add('hidden'); $('login').classList.remove('hidden'); }
$('btnSeed').onclick=()=>{localData.saveUsers([{username:'admin',password:'admin123',role:'admin'}]); $('loginMsg').textContent='Admin local créé. Clique Connexion.';}
$('btnLogin').onclick=async()=>{const e=$('loginEmail').value.trim(),p=$('loginPass').value; try{ if(e==='admin'){const u=localData.users().find(x=>x.username==='admin'&&x.password===p); if(!u) throw new Error('Admin local non créé'); state={user:{email:'admin'},role:'admin',local:true,currentPage:'dashboard'}; showApp(); return;} const cred=await signInWithEmailAndPassword(auth,e,p); state.user=cred.user; state.local=false; showApp(); }catch(err){$('loginMsg').textContent='Erreur: '+err.message}}
$('logout').onclick=async()=>{try{await signOut(auth)}catch{} state={user:null,role:'admin',local:false,currentPage:'dashboard'}; showLogin();}
document.querySelectorAll('.nav button[data-page]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); state.currentPage=b.dataset.page; render();});
function setPage(title){$('pageTitle').textContent=title; document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden')); $(state.currentPage).classList.remove('hidden')}
async function render(){ if(state.currentPage==='dashboard') return renderDashboard(); if(state.currentPage==='drivers') return renderDrivers(); if(state.currentPage==='import') return renderImport(); if(state.currentPage==='weeks') return renderWeeks(); if(state.currentPage==='settings') return renderSettings(); if(state.currentPage==='driverPortal') return renderDriverPortal(); }
async function renderDashboard(){setPage('Dashboard'); const drivers=await getDrivers(), weeks=await getWeeks(); const total=weeks.reduce((s,w)=>s+Number(w.total||0),0); $('dashboard').innerHTML=`<div class="grid"><div class="card stat"><span class="muted">Chauffeurs</span><br><b>${drivers.length}</b></div><div class="card stat"><span class="muted">Relevés</span><br><b>${weeks.length}</b></div><div class="card stat"><span class="muted">Total chauffeurs</span><br><b>${money(total)}</b></div><div class="card stat"><span class="muted">Mode</span><br><b>${state.local?'Local':'Firebase'}</b></div></div><div class="card"><h2>Bienvenue</h2><p>Importe les PDF Intelcom, génère les relevés, puis les chauffeurs peuvent voir leurs factures et choisir le véhicule conduit par jour.</p></div>`;}
async function renderDrivers(){setPage('Chauffeurs'); const drivers=await getDrivers(); $('drivers').innerHTML=`<div class="card"><h2>Ajouter / modifier chauffeur</h2><div class="row3"><div><label>Nom</label><input id="dName"></div><div><label>Code Intelcom</label><input id="dCode" placeholder="C0V3493"></div><div><label>Email</label><input id="dEmail"></div></div><div class="row"><div><label>Téléphone</label><input id="dPhone"></div><div><label>Actif</label><select id="dActive"><option value="true">Oui</option><option value="false">Non</option></select></div></div><button class="btn" id="saveDriver">Enregistrer chauffeur</button></div><div class="card"><h2>Liste chauffeurs</h2><table><thead><tr><th>Nom</th><th>Code</th><th>Email</th><th>Téléphone</th></tr></thead><tbody>${drivers.map(d=>`<tr><td>${d.name||''}</td><td>${d.code||''}</td><td>${d.email||''}</td><td>${d.phone||''}</td></tr>`).join('')}</tbody></table></div>`; $('saveDriver').onclick=async()=>{await saveDriver({name:$('dName').value,code:$('dCode').value,email:$('dEmail').value,phone:$('dPhone').value,active:$('dActive').value==='true'}); renderDrivers();}}
async function parsePdf(file){ const pdfjsLib=window.pdfjsLib; pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; const buf=await file.arrayBuffer(); const pdf=await pdfjsLib.getDocument({data:buf}).promise; let text=''; for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i); const content=await page.getTextContent(); text+=content.items.map(x=>x.str).join(' ')+'\n';} return extractIntelcom(text,file.name);}
function extractIntelcom(text,filename){ const driver=(text.match(/(C0[A-Z0-9]{4,})\s+([A-Za-zÀ-ÿ' -]{3,80})\s+Invoice To/i)||[]); const code=driver[1]||((filename.match(/C0[A-Z0-9]+/)||[])[0]||''); const name=(driver[2]||'Chauffeur inconnu').trim(); const week=(text.match(/Week reference:\s*([0-9]{4}-[0-9]{1,2})/i)||text.match(/\b(20\d{2}-\d{1,2})\b/)||[])[1]||''; const from=(text.match(/From:\s*(20\d{2}-\d{2}-\d{2})/i)||[])[1]||''; const to=(text.match(/To:\s*(20\d{2}-\d{2}-\d{2})/i)||[])[1]||''; const inv=Number(((text.match(/Total invoice\s*\$?([0-9,]+\.\d{2})/i)||[])[1]||'0').replace(/,/g,'')); const summary=[]; const r=/(20\d{2}-\d{2}-\d{2})\s+0\s+(\d+)\s+\$?([0-9,]+\.\d{2})\s+\$?([0-9,]+\.\d{2})\s+\$?([0-9,]+\.\d{2})\s+\$?([0-9,]+\.\d{1,2})/g; let m; while((m=r.exec(text))){summary.push({date:m[1],parcels:Number(m[2]),amount:Number(m[6]),vehicle:'Essence'});} if(summary.length===0){ const rr=/(20\d{2}-\d{2}-\d{2})\s+\w+\s+MONT/g; const dates=[...text.matchAll(rr)].map(x=x[1]); [...new Set(dates)].forEach(d=>summary.push({date:d,parcels:0,amount:0,vehicle:'Essence'})); } return {name,code,week,from,to,totalInvoice:inv,days:summary,filename};}
function feeForDay(day,settings){ if(day.parcels<=0 && day.amount<=0) return 0; if(settings.feeMode==='fixed') return Number(settings.dailyFixed||0); const rules=(settings.barèmes?.[day.vehicle]||[]).map(x=>({...x,min:Number(x.min),max:Number(x.max),amount:Number(x.amount)})); const hit=rules.find(x=>day.parcels>=x.min && day.parcels<=x.max); return hit?hit.amount:0;}
function calcWeek(data,settings){ const worked=data.days.filter(d=>Number(d.parcels)>0||Number(d.amount)>0).length; const subtotal=data.totalInvoice||data.days.reduce((s,d)=>s+d.amount,0); const commission=subtotal*Number(settings.commission||0)/100; const fees=data.days.reduce((s,d)=>s+feeForDay(d,settings),0); const total=subtotal-commission-fees; return {worked,subtotal,commission,fees,total};}
async function renderImport(){setPage('Import PDF Intelcom'); $('import').innerHTML=`<div class="card"><h2>Importer jusqu'à 40 PDF</h2><input type="file" id="pdfFiles" multiple accept="application/pdf"><div class="actions"><button class="btn" id="parseBtn">Lire les PDF</button><button class="btn green" id="saveWeeksBtn">Enregistrer les relevés</button></div><div id="preview"></div></div>`; let parsed=[]; $('parseBtn').onclick=async()=>{const files=[...$('pdfFiles').files].slice(0,40); const settings=await getSettings(); parsed=[]; $('preview').innerHTML='<p>Lecture en cours...</p>'; for(const f of files){parsed.push(await parsePdf(f));} $('preview').innerHTML=parsed.map((p,i)=>{const c=calcWeek(p,settings);return `<div class="card"><h3>${p.name} - Semaine ${p.week}</h3><p>${p.code} | ${p.from} au ${p.to}</p><table><thead><tr><th>Date</th><th>Colis</th><th>Montant</th><th>Véhicule</th></tr></thead><tbody>${p.days.map((d,j)=>`<tr><td>${d.date}</td><td>${d.parcels}</td><td>${money(d.amount)}</td><td><select data-i="${i}" data-j="${j}" class="vehicle"><option>Essence</option><option>Électrique</option><option>Diesel</option><option>Hybride</option></select></td></tr>`).join('')}</tbody></table><p><b>Total net: ${money(c.total)}</b></p></div>`}).join(''); document.querySelectorAll('.vehicle').forEach(s=>s.onchange=()=>{parsed[s.dataset.i].days[s.dataset.j].vehicle=s.value;});}; $('saveWeeksBtn').onclick=async()=>{const settings=await getSettings(); for(const p of parsed){const c=calcWeek(p,settings); await saveWeek({...p,...c,createdAt:new Date().toISOString(),settingsSnapshot:settings});} alert('Relevés enregistrés'); renderWeeks(); state.currentPage='weeks';};}
async function makePdf(w){const {jsPDF}=window.jspdf; const s=w.settingsSnapshot||await getSettings(); const doc=new jsPDF(); let y=14; doc.setFontSize(14); doc.text(`${w.name} - Semaine ${w.week}`,105,y,{align:'center'}); y+=8; doc.setFontSize(9); doc.text(`Date de génération : ${new Date().toISOString().slice(0,10)}`,14,y); y+=6; doc.text(`Période de paie : ${w.from} au ${w.to}`,14,y); y+=8; doc.setFontSize(10); doc.text(s.station||'',14,y); y+=5; (s.brokerName+'\n'+(s.address||'')).split('\n').forEach(line=>{doc.text(line,14,y);y+=5}); y+=2; doc.text(`À L’ATTENTION DE : ${w.name}`,125,35); doc.text(`Code : ${w.code}`,125,40); y+=3; doc.setFontSize(9); doc.text('DATES',14,y); doc.text('COLIS',70,y); doc.text('MONTANT',105,y); y+=5; w.days.forEach(d=>{doc.text(d.date,14,y); doc.text(String(d.parcels),72,y); doc.text(money(d.amount),105,y); y+=5}); y+=4; [['Sous total Intelcom',w.subtotal],['Commission broker',w.commission],['Jours travaillés',w.worked],['Frais broker',w.fees],['Déduction',0],['Avance',0],['TOTAL',w.total]].forEach(([k,v])=>{doc.setFont(undefined,k==='TOTAL'?'bold':'normal'); doc.text(`${k} : ${typeof v==='number'?money(v):v}`,14,y); y+=6}); doc.setFont(undefined,'normal'); y+=3; doc.text(`Paiement à l’ordre de : ${s.payTo||''}`,14,y); y+=5; doc.text('Règlement : Par virement bancaire',14,y); y+=5; doc.text(`Email : ${s.email||''}`,14,y); y+=5; doc.text(`Téléphone : ${s.phone||''}`,14,y); y+=7; doc.text('MERCI DE VOTRE CONFIANCE',105,y,{align:'center'});
 doc.addPage(); y=14; doc.setFontSize(13); doc.text('Détails des frais broker',14,y); y+=8; doc.setFontSize(9); doc.text('Date',14,y); doc.text('Colis',50,y); doc.text('Véhicule',75,y); doc.text('Frais',125,y); y+=6; w.days.filter(d=>d.parcels>0||d.amount>0).forEach(d=>{doc.text(d.date,14,y); doc.text(String(d.parcels),52,y); doc.text(d.vehicle||'Essence',75,y); doc.text(money(feeForDay(d,s)),125,y); y+=5}); return doc;}
async function renderWeeks(){setPage('Relevés'); const weeks=await getWeeks(); $('weeks').innerHTML=`<div class="card"><h2>Relevés générés</h2><table><thead><tr><th>Chauffeur</th><th>Semaine</th><th>Total</th><th>Action</th></tr></thead><tbody>${weeks.map((w,i)=>`<tr><td>${w.name}</td><td>${w.week}</td><td>${money(w.total)}</td><td><button class="btn secondary pdf" data-i="${i}">PDF</button></td></tr>`).join('')}</tbody></table></div>`; document.querySelectorAll('.pdf').forEach(b=>b.onclick=async()=>{const doc=await makePdf(weeks[b.dataset.i]); doc.save(`${weeks[b.dataset.i].name} - Semaine ${weeks[b.dataset.i].week}.pdf`);});}
async function renderSettings(){setPage('Paramètres & barèmes'); const s=await getSettings(); $('settings').innerHTML=`<div class="card"><h2>Paramètres broker</h2><div class="row"><div><label>Nom entreprise</label><input id="sBroker" value="${s.brokerName||''}"></div><div><label>Station</label><input id="sStation" value="${s.station||''}"></div></div><label>Adresse</label><textarea id="sAddress">${s.address||''}</textarea><div class="row3"><div><label>Commission %</label><input id="sCommission" type="number" value="${s.commission||25}"></div><div><label>Mode frais</label><select id="sFeeMode"><option value="fixed">Frais fixe par jour travaillé</option><option value="barème">Barème par colis</option></select></div><div><label>Frais fixe / jour</label><input id="sDaily" type="number" value="${s.dailyFixed||60}"></div></div><div class="row3"><div><label>Paiement à l'ordre de</label><input id="sPayTo" value="${s.payTo||''}"></div><div><label>Email</label><input id="sEmail" value="${s.email||''}"></div><div><label>Téléphone</label><input id="sPhone" value="${s.phone||''}"></div></div><div class="actions"><button class="btn secondary" id="toggleBaremes">Afficher / modifier barèmes</button><button class="btn" id="saveSettings">Enregistrer paramètres</button></div></div><div class="card hidden" id="baremeBox"><h2>Barèmes par véhicule</h2><div id="baremes"></div></div>`; $('sFeeMode').value=s.feeMode||'barème'; renderBaremes(s); $('toggleBaremes').onclick=()=>$('baremeBox').classList.toggle('hidden'); $('saveSettings').onclick=async()=>{const ns={...s,brokerName:$('sBroker').value,station:$('sStation').value,address:$('sAddress').value,commission:Number($('sCommission').value),feeMode:$('sFeeMode').value,dailyFixed:Number($('sDaily').value),payTo:$('sPayTo').value,email:$('sEmail').value,phone:$('sPhone').value,barèmes:readBaremes()}; await saveSettings(ns); alert('Paramètres enregistrés'); renderSettings();}}
function renderBaremes(s){const types=['Essence','Électrique','Diesel','Hybride']; $('baremes').innerHTML=types.map(t=>`<h3>${t}</h3><table data-type="${t}"><thead><tr><th>Min</th><th>Max</th><th>Frais</th></tr></thead><tbody>${(s.barèmes?.[t]||[]).map(r=>`<tr><td><input value="${r.min}"></td><td><input value="${r.max}"></td><td><input value="${r.amount}"></td></tr>`).join('')}</tbody></table><button class="btn secondary addRow" data-type="${t}">+ Ajouter tranche</button>`).join(''); document.querySelectorAll('.addRow').forEach(b=>b.onclick=()=>{const tb=document.querySelector(`table[data-type="${b.dataset.type}"] tbody`); tb.insertAdjacentHTML('beforeend','<tr><td><input value="0"></td><td><input value="999"></td><td><input value="0"></td></tr>')});}
function readBaremes(){const out={}; document.querySelectorAll('#baremes table').forEach(t=>{out[t.dataset.type]=[...t.querySelectorAll('tbody tr')].map(r=>{const i=r.querySelectorAll('input');return {min:Number(i[0].value),max:Number(i[1].value),amount:Number(i[2].value)}})}); return out;}
async function renderDriverPortal(){setPage('Espace chauffeur'); const weeks=await getWeeks(); $('driverPortal').innerHTML=`<div class="card"><h2>Mes relevés / simulation chauffeur</h2><p class="muted">Dans la vraie version Firebase, le chauffeur verra seulement ses propres relevés selon son compte. Ici tu peux tester l'affichage.</p><table><thead><tr><th>Chauffeur</th><th>Semaine</th><th>Total</th><th>PDF</th></tr></thead><tbody>${weeks.map((w,i)=>`<tr><td>${w.name}</td><td>${w.week}</td><td>${money(w.total)}</td><td><button class="btn secondary pdfd" data-i="${i}">Télécharger</button></td></tr>`).join('')}</tbody></table></div>`; document.querySelectorAll('.pdfd').forEach(b=>b.onclick=async()=>{const doc=await makePdf(weeks[b.dataset.i]); doc.save(`${weeks[b.dataset.i].name} - Semaine ${weeks[b.dataset.i].week}.pdf`);});}
renderBaremes(defaultSettings());
</script>
</body>
</html>
